    <!-- Effet trail-->
    <script src="scripts/jquery.min.js"></script>

<script>
   $(document).ready(function() {
    const cursor = $(".curseur");
    const wrap = $("#wrap");

    let lastMouseX = 0;
    let lastMouseY = 0;
    let lastTimestamp = Date.now();

    $(document).mousemove(function(e) {
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        const deltaX = mouseX - lastMouseX;
        const deltaY = mouseY - lastMouseY;
        const deltaTime = Date.now() - lastTimestamp;

        const speedX = Math.abs(deltaX) / deltaTime;
        const speedY = Math.abs(deltaY) / deltaTime;

        cursor.css({
            top: mouseY + "px",
            left: mouseX + "px"
        });

        lastMouseX = mouseX;
        lastMouseY = mouseY;
        lastTimestamp = Date.now();
    });

    
    // trail sur le curseur
 
    function getRandomInt(min, max) {
    return Math.round(Math.random() * (max - min + 1)) + min;
}

let range = 20; // Initial range

    function createBall() {
        if (lastMouseX > 0 && lastMouseY > 0) {
            const sizeInt = getRandomInt(2, 3);
            const left = getRandomInt(lastMouseX - range - sizeInt, lastMouseX + range);
            const top = getRandomInt(lastMouseY - range - sizeInt, lastMouseY + range);

            const ball = $("<div>").addClass('ball').css({
                left: left + 'px',
                top: top + 'px',
                width: sizeInt + 'px',
                height: sizeInt + 'px'
            });

            wrap.append(ball);
            ball.one("webkitAnimationEnd mozAnimationEnd MSAnimationEnd oanimationend animationend", function() {
                $(this).remove();
            });
        }
    }

    // Click event pour changer Ã  100
    $(document).click(function() {
    range = 100; 
    
    setTimeout(function() {
        range = 20; 
    }, 1000);
});

    setInterval(createBall, 0.01);
});

</script>
