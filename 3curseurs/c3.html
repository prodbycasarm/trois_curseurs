    <script src="scripts/jquery.min.js"></script>
    <script>

function createTrail() {
  const trail = document.createElement("div");
  trail.classList.add("trail");
  document.body.appendChild(trail);
  
  setTimeout(() => {
    trail.remove();
  }, 5000); // Adjust the duration of the trail
}

  

        const cursor = document.querySelector('.cursor');

        document.addEventListener('mousemove', e => {
            cursor.style.top = (e.pageY - 0) + "px";
            cursor.style.left = (e.pageX - 0) + "px";
        });

        document.addEventListener('click', () => {
            cursor.classList.add("expand");

            setTimeout(() => {
                cursor.classList.remove("expand");
            }, 400);
        });

        // Trail derriere le premier curseur
        $(document).ready(function(){
            var mousePos = {};

            function getRandomInt(min, max) {
                return Math.round(Math.random() * (max - min + 1)) + min;
            }

            $(window).mousemove(function(e) {
                mousePos.x = e.pageX;
                mousePos.y = e.pageY;
            });

            $(window).mouseleave(function(e) {
                mousePos.x = -1;
                mousePos.y = -1;
            });

            var draw = setInterval(function(){
                if(mousePos.x > 0 && mousePos.y > -10){

                    var range = 10; // Adjust the range here

                    var sizeInt = getRandomInt(20, 5);
                    var size = "height: " + sizeInt + "px; width: " + sizeInt + "px;";

                    var left = "left: " + getRandomInt(mousePos.x - range - sizeInt, mousePos.x + range) + "px;";

                    var top = "top: " + getRandomInt(mousePos.y - range - sizeInt, mousePos.y + range) + "px;"; 

                    var style = left + top + size;
                    $("<div class='ball' style='" + style + "'></div>").appendTo('#wrap').one("webkitAnimationEnd mozAnimationEnd MSAnimationEnd oanimationend animationend", function(){$(this).remove();}); 
                }
            }, 10); // Adjust the interval here (milliseconds)
        });



        //For Fire balls
        $(document).ready(function(){
    var mousePos = {};

    function getRandomInt(min, max) {
        return Math.round(Math.random() * (max - min + 1)) + min;
    }

    $('.trail').each(function() {
        var trailPos = $(this).offset();
        $(this).css('top', trailPos.top + 'px');
        $(this).css('left', trailPos.left + 'px');
    });

    var draw = setInterval(function(){
        $('.trail').each(function() {
            var trailPos = $(this).offset();
            mousePos.x = trailPos.left;
            mousePos.y = trailPos.top;

            if(mousePos.x > 0 && mousePos.y > 0){

                var range = 500; // Adjust the range here

                var sizeInt = getRandomInt(20, 2);
                var size = "height: " + sizeInt + "px; width: " + sizeInt + "px;";

                var left = "left: " + getRandomInt(mousePos.x - range - sizeInt, mousePos.x + range) + "px;";

                var top = "top: " + getRandomInt(mousePos.y - range - sizeInt, mousePos.y + range) + "px;"; 

                 }
        });
    }, 100); // Adjust the interval here (milliseconds)
});

       
        
    </script>
